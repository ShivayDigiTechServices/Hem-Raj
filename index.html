<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIVAY Mock Services - TCS CBT Exam Portal</title>
    <style>
        :root {
            --tcs-blue: #0f2c59;
            --tcs-light-blue: #1e4a8a;
            --tcs-orange: #ff9933;
            --green-saved: #2d8a4e;
            --red-unanswered: #c9302c;
            --purple-review: #7b1fa2;
            --gray-unvisited: #f4f4f4;
            --border-color: #d3d3d3;
            --text-dark: #333333;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: var(--text-dark);
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .top-header {
            background-color: #ffffff;
            color: var(--tcs-blue);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--tcs-blue);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 18px;
            font-weight: bold;
        }

        .exam-title-badge {
            font-size: 13px;
            font-weight: bold;
            color: white;
            background-color: var(--tcs-blue);
            padding: 6px 12px;
            border-radius: 4px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .question-panel {
            width: 70%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .q-header-bar {
            background-color: #f4f7f9;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
        }

        .question-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .q-num-badge {
            background-color: var(--tcs-blue);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            border-radius: 3px;
            margin-right: 10px;
        }

        .q-text-section {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 15px;
        }

        .lang-text.hindi {
            color: #1a5276;
            margin-top: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
        }

        .sidebar-panel {
            width: 30%;
            background-color: #f4f5f7;
            display: flex;
            flex-direction: column;
        }

        .candidate-card {
            background-color: #ffffff;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timer-container {
            background-color: #ffebee;
            color: var(--red-unanswered);
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
        }

        .palette-container {
            flex: 1;
            padding: 15px;
        }

        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .grid-item {
            aspect-ratio: 1;
            border: 1px solid var(--border-color);
            background-color: var(--gray-unvisited);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
        }

        .grid-item.active { outline: 2px solid var(--tcs-light-blue); }
        .status-saved { background-color: var(--green-saved) !important; color: white; }
        .status-unanswered { background-color: var(--red-unanswered) !important; color: white; }
        .status-review { background-color: var(--purple-review) !important; color: white; }

        .footer-bar {
            background-color: #f4f7f9;
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .footer-btn {
            padding: 10px 22px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .btn-save-next { background-color: var(--tcs-light-blue); color: white; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="brand-title">SHIVAY MOCK SERVICES</div>
        <div class="exam-title-badge">HPRCA JOA IT Mock Test 2026</div>
    </header>

    <div class="main-container">
        <section class="question-panel">
            <div class="q-header-bar">SECTION: Computer Science & IT (JOA IT)</div>
            <div class="question-area" id="question-render"></div>
        </section>

        <aside class="sidebar-panel">
            <div class="timer-container" id="time-left">⏳ Time Left: 45:00</div>
            <div class="candidate-card">
                <div style="width:50px; height:50px; background:#ccc; text-align:center; line-height:50px;">PHOTO</div>
                <div>
                    <strong>Candidate Name</strong><br>
                    Roll No: JOA-2026998
                </div>
            </div>
            <div class="palette-container">
                <div style="font-size: 12px; font-weight: bold; color: #555;">Question Palette</div>
                <div class="grid-matrix" id="question-grid"></div>
            </div>
        </aside>
    </div>

    <footer class="footer-bar">
        <div>
            <button class="footer-btn" onclick="clearAnswer()">Clear Response</button>
            <button class="footer-btn" style="color: var(--purple-review);" onclick="markForReview()">Mark for Review & Next</button>
        </div>
        <button class="footer-btn btn-save-next" id="next-btn" onclick="saveAndNext()">Save & Next</button>
    </footer>

    <script>
        const quizQuestions = [
            { qE: "A __________ is an electronic device that processes data and converts it into information.", qH: "एक __________ एक इलेक्ट्रॉनिक उपकरण है जो डेटा को प्रोसेस करता है और इसे सूचना में परिवर्तित करता है।", options: ["Computer / कंप्यूटर", "Processor / प्रोसेसर", "Case / केस", "Styles / स्टाइल्स"], correct: 0 },
            { qE: "__________ is processed into information by computer processor?", qH: "कंप्यूटर प्रोसेसर द्वारा किसे सूचना में संसाधित (process) किया जाता है?", options: ["Number / नंबर", "Processor / प्रोसेसर", "Input / इनपुट", "Data / डेटा"], correct: 3 },
            { qE: "First supercomputer developed in India is:", qH: "भारत में विकसित पहला सुपरकंप्यूटर कौन सा है?", options: ["PARAM 8000 / परम 8000", "Aryabhatt / आर्यभट्ट", "Buddha / बुद्ध", "Ram / राम"], correct: 0 }
        ];

        let currentIdx = 0;
        let studentAnswers = new Array(quizQuestions.length).fill(null);
        let questionStatuses = new Array(quizQuestions.length).fill('unvisited');

        function loadQuestion() {
            const q = quizQuestions[currentIdx];
            const container = document.getElementById('question-render');
            
            let html = `
                <div class="q-text-section">
                    <div class="lang-text english"><span class="q-num-badge">Question ${currentIdx + 1}</span><strong>${q.qE}</strong></div>
                    <div class="lang-text hindi"><span class="q-num-badge">प्रश्न ${currentIdx + 1}</span><strong>${q.qH}</strong></div>
                </div>
                <div class="options-group">
            `;

            q.options.forEach((opt, index) => {
                let isChecked = (studentAnswers[currentIdx] === index) ? "checked" : "";
                html += `
                    <label class="option-label" onclick="selectOpt(${index})">
                        <input type="radio" name="q-ans" id="opt-${index}" ${isChecked}>
                        <span>${opt}</span>
                    </label>
                `;
            });

            container.innerHTML = html + `</div>`;
            
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active'));
            document.getElementById("grid-q-" + (currentIdx + 1)).classList.add('active');
            document.getElementById('next-btn').innerText = (currentIdx === quizQuestions.length - 1) ? "Submit Exam" : "Save & Next";
        }

        function selectOpt(index) {
            studentAnswers[currentIdx] = index;
            document.getElementById(`opt-${index}`).checked = true;
        }

        function clearAnswer() {
            studentAnswers[currentIdx] = null;
            document.querySelectorAll('input[name="q-ans"]').forEach(el => el.checked = false);
            questionStatuses[currentIdx] = 'unanswered';
            updateGridVisuals();
        }

        function markForReview() {
            questionStatuses[currentIdx] = 'review';
            updateGridVisuals();
            proceedNext();
        }

        function saveAndNext() {
            questionStatuses[currentIdx] = (studentAnswers[currentIdx] !== null) ? 'saved' : 'unanswered';
            updateGridVisuals();
            proceedNext();
        }

        function proceedNext() {
            if(currentIdx < quizQuestions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                alert("Exam Submitted Successfully!");
            }
        }

        function buildGridPalette() {
            const grid = document.getElementById("question-grid");
            grid.innerHTML = "";
            for (let i = 1; i <= quizQuestions.length; i++) {
                const item = document.createElement("div");
                item.className = "grid-item";
                item.innerText = i;
                item.id = "grid-q-" + i;
                item.onclick = () => { currentIdx = i - 1; loadQuestion(); };
                grid.appendChild(item);
            }
            updateGridVisuals();
        }

        function updateGridVisuals() {
            for (let i = 0; i < quizQuestions.length; i++) {
                const item = document.getElementById("grid-q-" + (i + 1));
                if(item) {
                    item.className = "grid-item " + (questionStatuses[i] !== 'unvisited' ? 'status-' + questionStatuses[i] : '');
                }
            }
        }

        let time = 45 * 60;
        setInterval(() => {
            let min = Math.floor(time / 60);
            let sec = time % 60;
            document.getElementById('time-left').innerText = `⏳ Time Left: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(time > 0) time--;
        }, 1000);

        buildGridPalette();
        loadQuestion();
    </script>
</body>
</html>
